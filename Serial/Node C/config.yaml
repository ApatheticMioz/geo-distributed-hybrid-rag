# Node VPN addresses (WireGuard VPN)
node_b:
  host: "10.8.0.5"          # Node B WireGuard IP — Dense Retrieval Engine
  port: 50051               # Node B gRPC DenseDispatcher port

node_a:
  grpc_host: "10.8.0.1"     # Node A WireGuard IP — Node C -> Node A gRPC over WireGuard
  grpc_port: 50052          # Node A gRPC GenerationOrchestrator port
  lan_host:  "10.8.0.1"     # Node A WireGuard IP for Node B -> Node A forwarding

# Tantivy disk-backed BM25 index
corpus:
  tantivy_index_path: "data/tantivy_index"
  raw_corpus_path: "data/documents.jsonl"

# Retrieval parameters
retrieval:
  top_k: 10

# FastAPI gateway
gateway:
  host: "0.0.0.0"
  port: 8000
