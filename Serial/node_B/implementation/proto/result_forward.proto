syntax = "proto3";
package coordination;

import "coordination.proto";

// Node B sends this to Node A after completing dense retrieval.
message DenseResultForward {
  string query_id                 = 1;
  repeated RetrievedDocument docs = 2;
  double t_dense_ms               = 3;
}

service ResultForwarder {
  rpc ForwardDenseResults (DenseResultForward) returns (DenseResultAck);
}

message DenseResultAck {
  string query_id = 1;
  bool accepted   = 2;
}
