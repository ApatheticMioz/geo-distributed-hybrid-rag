syntax = "proto3";

package retrieval;

service DenseRetrievalService {
  rpc Retrieve (QueryRequest) returns (RetrievalResponse) {}
}

message QueryRequest {
  string query = 1;
  int32 top_k = 2;
}

message RetrievedDocument {
  string doc_id = 1;
  string text = 2;
  float score = 3;
  int32 rank = 4;
}

message RetrievalResponse {
  repeated RetrievedDocument documents = 1;
}
